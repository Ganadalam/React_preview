<!-- react = "바뀐 부분"만 rerender! awesome Point Interactive 적합-->
<!-- counter가 우리가 원하는 곳 외에서도 바뀌게 해야할 수 있음
 state 바꾸기 - (1) serCounter(숫자 or 문자) = 고정
 (2) 함수 전달(계산): 이전 -> 현재 값  -->

<!-- JSX = HTML 과 유사, js word 사용 불가 = for, class -> htmlFor, className-->
<!--react 에서 input은 통제 가능 범위 X -> useState make needed -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="root"></div>
  </body>
  <script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    function App() {
      const [amount, setAmount] = React.useState(0); // useState는 array 제공, 첫 element = current value
      const [flipped, setFlipped] = React.useState(false);
      const onChange = (event) => {
        setAmount(Number(event.target.value)); // data update
      };
      const reset = () => setAmount(0);
      const onFlip = () => {
        reset();

        setFlipped((current) => !current);
      };

      return (
        <div>
          <h1 className="hi">Converter</h1>

          <div>
            <label htmlFor="minutes">Minutes</label>
            <input
              value={flipped ? amount * 60 : amount}
              id="minutes"
              placeholder="Minutes"
              type="number"
              onChange={onChange}
              disabled={flipped} // filpped == true
            />
          </div>
          <div>
            <label htmlFor="hours">Hours</label>

            <input
              value={flipped ? amount : Math.round(amount / 60)}
              id="hours"
              placeholder="Hours"
              type="number"
              disabled={!flipped} // fliiped == false
              onChange={onChange}
            />
          </div>
          <button onClick={reset}> Reset </button>
          <button onClick={onFlip}> Flipped </button>
        </div>
      );
    }
    const root = document.getElementById("root");
    ReactDOM.render(<App />, root);
  </script>
</html>
