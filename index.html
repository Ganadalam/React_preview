<!-- react = 바뀐 부분만 rerender! awesome Point Interactive 적합-->
<!-- counter가 우리가 원하는 곳 외에서도 바뀌게 해야할 수 있음
 state 바꾸기 - (1) serCounter(숫자 or 문자) = 고정
 (2) 함수 전달(계산): 이전 -> 현재 값  -->

<!-- JSX = HTML 과 유사, js word 사용 불가 = for, class -> htmlFor, className-->
<!--react 에서 input은 통제 가능 범위 X -> useState make needed -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="root"></div>
  </body>
  <script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const root = document.getElementById("root");
    function App() {
      const [minutes, setMinutes] = React.useState(""); // useState는 array 제공, 첫 element = current value
      const onChange = (event) => {
        setMinutes(event.target.value);
      };

      return (
        <div>
          <h1 className="hi">Converter</h1>
          <label htmlFor="minutes">minutes</label>
          <input
            value={minutes}
            id="minutes"
            placeholder="Minutes"
            type="number"
            onChange={onChange}
          />
          <h4> You want to convert {minutes} </h4>
          <label htmlFor="hours">Hours</label>

          <input placeholder="Hours" type="number" />
        </div>
      );
    }

    ReactDOM.render(<App />, root);
  </script>
</html>
